<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow — Stay In The Zone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="orb2"></div>

<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      <div class="logo-icon">
        <div class="wave-bars">
          <div class="wb"></div>
          <div class="wb"></div>
          <div class="wb"></div>
          <div class="wb"></div>
          <div class="wb"></div>
        </div>
      </div>
      <div>
        <div class="logo-text">Task<span>Flow</span></div>
        <div class="logo-sub">Stay In The Zone</div>
      </div>
    </div>
    <div class="header-actions">
      <a href="http://midterm-exam-javascript-dela-cruz.mypressonline.com/" target="_blank" rel="noopener noreferrer" class="btn btn-link-site">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        Link to the website — Please open
      </a>
      <button class="btn btn-primary" onclick="openModal()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Task
      </button>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats">
    <div class="stat-card" style="--stat-color: var(--text)">
      <div class="stat-label">Total Tasks</div>
      <div class="stat-value" id="stat-total">—</div>
    </div>
    <div class="stat-card" style="--stat-color: var(--pending)">
      <div class="stat-label">Pending</div>
      <div class="stat-value" id="stat-pending">—</div>
    </div>
    <div class="stat-card" style="--stat-color: var(--in_progress)">
      <div class="stat-label">In Progress</div>
      <div class="stat-value" id="stat-inprogress">—</div>
    </div>
    <div class="stat-card" style="--stat-color: var(--completed)">
      <div class="stat-label">Completed</div>
      <div class="stat-value" id="stat-completed">—</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search tasks..." oninput="handleSearch()">
    </div>
    <select class="filter" id="filterStatus" onchange="loadTasks()">
      <option value="">All Status</option>
      <option value="pending">Pending</option>
      <option value="in_progress">In Progress</option>
      <option value="completed">Completed</option>
    </select>
    <select class="filter" id="filterPriority" onchange="loadTasks()">
      <option value="">All Priority</option>
      <option value="high">High</option>
      <option value="medium">Medium</option>
      <option value="low">Low</option>
    </select>
  </div>

  <!-- TASK LIST -->
  <div class="task-list" id="taskList">
    <div class="empty-state">
      <div class="spinner" style="width:32px;height:32px;margin:0 auto 12px;border-width:3px;"></div>
      <p>Loading tasks...</p>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">New Task</div>
      <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="taskId">
      <div class="form-group">
        <label class="form-label">Task Title *</label>
        <input type="text" class="form-control" id="taskTitle" placeholder="What needs to be done?">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="taskDesc" placeholder="Add some details..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Priority</label>
          <select class="form-control" id="taskPriority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="taskStatus">
            <option value="pending" selected>Pending</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input type="date" class="form-control" id="taskDue">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveTask()">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
        Save Task
      </button>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal confirm-modal">
    <div class="modal-header">
      <div class="modal-title">Confirm Delete</div>
      <button class="modal-close" onclick="closeConfirm()" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="confirm-icon">⚠️</div>
      <h3>Delete this task?</h3>
      <p class="sub">You are about to permanently remove the following task:</p>
      <div class="confirm-task-box">
        <div class="id-line">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
          Task ID: <strong id="confirmTaskId">—</strong>
        </div>
        <div class="title-line" id="confirmTaskTitle">—</div>
      </div>
      <p class="confirm-warn">⚠ This action cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Delete Task
      </button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script type="module" src="js/main.js"></script>
</body>
</html>
